<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Görsel İşleme Sistemi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a0000 50%, #330000 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(220, 20, 60, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(139, 0, 0, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: linear-gradient(145deg, #1a1a1a 0%, #0d0d0d 100%);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 25px 70px rgba(220, 20, 60, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(220, 20, 60, 0.3);
            position: relative;
            z-index: 1;
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }
        
        .logo {
            max-width: 300px;
            height: auto;
            display: inline-block;
            filter: drop-shadow(0 10px 30px rgba(220, 20, 60, 0.4));
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .logo:hover {
            filter: drop-shadow(0 15px 40px rgba(220, 20, 60, 0.6));
            transform: scale(1.05);
        }
        
        .upload-area {
            border: 3px dashed #dc143c;
            border-radius: 20px;
            padding: 0;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(145deg, #1f1f1f, #141414);
            position: relative;
            overflow: hidden;
            height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .upload-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            position: relative;
            z-index: 2;
        }
        
        .upload-area::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(220, 20, 60, 0.2), transparent);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .upload-area:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .upload-area:hover {
            border-color: #ff0844;
            background: linear-gradient(145deg, #252525, #1a1a1a);
            box-shadow: 0 10px 40px rgba(220, 20, 60, 0.4);
            transform: translateY(-2px);
        }
        
        .upload-area.dragover {
            border-color: #ff6b6b;
            background: linear-gradient(145deg, #2a0a0a, #1f0505);
            box-shadow: 0 15px 50px rgba(220, 20, 60, 0.6);
        }
        
        .preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 17px;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        .upload-area.has-image {
            border-color: #22c55e;
            border-style: solid;
        }
        
        .upload-area.has-image .upload-content {
            display: none;
        }
        
        .upload-area.has-image .preview {
            display: block;
        }
        
        .upload-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.7;
            transition: all 0.3s;
        }
        
        .upload-area:hover .upload-icon {
            opacity: 1;
            transform: scale(1.1);
        }
        
        .upload-text {
            font-size: 18px;
            color: #ff6b6b;
            font-weight: 700;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            color: #ff6b6b;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        input, select {
            width: 100%;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background: #1a1a1a;
            color: #fff;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #dc143c;
            background: #202020;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.3);
        }
        
        input::placeholder {
            color: #666;
        }
        
        /* Giyim Türü Butonları */
        .giyim-btn {
            padding: 20px 15px;
            border: 2px solid #333;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(145deg, #1f1f1f, #141414);
            color: #999;
            text-align: center;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .giyim-icon {
            width: 40px;
            height: 40px;
            stroke: #999;
            transition: all 0.3s;
        }
        
        .giyim-btn:hover .giyim-icon {
            stroke: #ff6b6b;
            transform: scale(1.1);
        }
        
        .giyim-btn.active .giyim-icon {
            stroke: white;
        }
        
        .giyim-btn:hover {
            border-color: #dc143c;
            background: linear-gradient(145deg, #252525, #1a1a1a);
            color: #ff6b6b;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(220, 20, 60, 0.3);
        }
        
        .giyim-btn.active {
            border-color: #dc143c;
            background: linear-gradient(135deg, #dc143c 0%, #8b0000 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(220, 20, 60, 0.5);
            transform: scale(1.05);
        }
        
        .giyim-btn.active:hover {
            background: linear-gradient(135deg, #ff0844 0%, #dc143c 100%);
            transform: scale(1.05) translateY(-2px);
        }
        
        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn:hover::before {
            width: 400px;
            height: 400px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #dc143c 0%, #8b0000 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(220, 20, 60, 0.4);
            border: 1px solid rgba(220, 20, 60, 0.5);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(220, 20, 60, 0.6);
            background: linear-gradient(135deg, #ff0844 0%, #dc143c 100%);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #8b0000 0%, #dc143c 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(139, 0, 0, 0.4);
            border: 1px solid rgba(139, 0, 0, 0.5);
        }
        
        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(220, 20, 60, 0.6);
            background: linear-gradient(135deg, #a00000 0%, #ff0844 100%);
        }
        
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            filter: grayscale(100%);
        }
        
        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            display: none;
            border-left: 4px solid;
            animation: slideIn 0.4s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .result.success {
            background: rgba(0, 128, 0, 0.1);
            color: #4ade80;
            border-color: #22c55e;
            box-shadow: 0 5px 20px rgba(34, 197, 94, 0.2);
        }
        
        .result.error {
            background: rgba(220, 20, 60, 0.1);
            color: #ff6b6b;
            border-color: #dc143c;
            box-shadow: 0 5px 20px rgba(220, 20, 60, 0.2);
        }
        
        .loading {
            text-align: center;
            display: none;
            margin: 25px 0;
        }
        
        .spinner {
            border: 5px solid #1a1a1a;
            border-top: 5px solid #dc143c;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.5);
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading p {
            color: #ff6b6b;
            font-weight: 600;
            margin-top: 15px;
            letter-spacing: 1px;
        }
        
        .ai-results {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(145deg, #1f1f1f, #141414);
            border-radius: 15px;
            border: 1px solid rgba(220, 20, 60, 0.3);
        }
        
        .ai-results h3 {
            color: #ff6b6b;
            margin-bottom: 15px;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .ai-results p {
            color: #ccc;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .ai-image {
            width: 100%;
            border-radius: 12px;
            margin-top: 15px;
            border: 2px solid rgba(220, 20, 60, 0.4);
            box-shadow: 0 10px 30px rgba(220, 20, 60, 0.3);
            transition: transform 0.3s;
        }
        
        .ai-image:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 40px rgba(220, 20, 60, 0.5);
        }
        
        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .giyim-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        
        /* Mobil Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .upload-grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }
            
            .upload-area {
                padding: 35px 20px;
            }
            
            .giyim-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }
            
            .giyim-btn {
                padding: 15px 10px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="assets/logo.png" alt="Logo" class="logo">
        </div>
        
        <!-- Dosya Yükleme Alanları -->
        <div class="upload-grid">
            <!-- Ön Kıyafet Görseli -->
            <div style="text-align: center;">
                <div class="upload-area" id="uploadAreaFront">
                    <div class="upload-content">
                        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="#dc143c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <p class="upload-text">Kıyafetin Önü</p>
                    </div>
                    <input type="file" id="fileInputFront" accept="image/*" style="display: none;">
                    <img id="previewFront" class="preview">
                </div>
            </div>
            
            <!-- Arka Kıyafet Görseli -->
            <div style="text-align: center;">
                <div class="upload-area" id="uploadAreaBack">
                    <div class="upload-content">
                        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="#dc143c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <p class="upload-text">Kıyafetin Arkası</p>
                    </div>
                    <input type="file" id="fileInputBack" accept="image/*" style="display: none;">
                    <img id="previewBack" class="preview">
                </div>
            </div>
        </div>
        
        <!-- Giyim Türü Butonları -->
        <div class="form-group">
            <label>Giyim Türü:</label>
            <div class="giyim-grid">
                <button type="button" class="giyim-btn" id="ustGiyimBtn" data-value="Üst Giyim">
                    <svg class="giyim-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.47a1 1 0 00.99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.84l.58-3.47a2 2 0 00-1.34-2.23z"></path>
                    </svg>
                    <span>Üst Giyim</span>
                </button>
                <button type="button" class="giyim-btn" id="altGiyimBtn" data-value="Alt Giyim">
                    <svg class="giyim-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 7l4-3h8l4 3v2l-2 11H6L4 9V7z"></path>
                        <path d="M8 20v-9"></path>
                        <path d="M16 20v-9"></path>
                        <path d="M12 4v7"></path>
                    </svg>
                    <span>Alt Giyim</span>
                </button>
                <button type="button" class="giyim-btn" id="elbiseBtn" data-value="Elbise">
                    <svg class="giyim-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2l-2 4h-4l2 2-2 2h4l2 12h4l2-12h4l-2-2 2-2h-4l-2-4h-4z"></path>
                        <line x1="12" y1="6" x2="12" y2="22"></line>
                    </svg>
                    <span>Elbise</span>
                </button>
            </div>
        </div>
        
        <div class="form-group">
            <label>Adet:</label>
            <input type="number" id="adet" placeholder="Örn: 10" min="1" value="1">
        </div>
        
        <div class="form-group">
            <label>Kalite:</label>
            <input type="text" id="kalite" placeholder="Örn: A+, A, B, İyi, Orta, vb.">
        </div>
        
        <div class="form-group">
            <label>Beden:</label>
            <input type="text" id="beden" placeholder="Örn: M, L, XL">
        </div>
        
        <div class="form-group">
            <label>Fiyat:</label>
            <input type="text" id="fiyat" placeholder="Örn: 299.99 TL">
        </div>
        
        <!-- AI İşleme Butonu (Opsiyonel) -->
        <button class="btn btn-primary" id="aiBtn" disabled>
            ✨ AI ile İyileştir (Opsiyonel)
        </button>
        
        <!-- Yükleme Animasyonu -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #667eea;">AI çalışıyor, lütfen bekleyin...</p>
        </div>
        
        <!-- AI Sonuçları -->
        <div class="ai-results" id="aiResults">
            <h3>AI Sonuçları:</h3>
            <p><strong>Ön Görsel:</strong></p>
            <img id="onGorsel" class="ai-image">
            <p style="margin-top: 15px;"><strong>Arka Görsel:</strong></p>
            <img id="arkaGorsel" class="ai-image">
        </div>
        
        <!-- Kaydet Butonu -->
        <button class="btn btn-success" id="saveBtn" disabled>
            💾 Google Sheets'e Kaydet
        </button>
        
        <!-- Sonuç Mesajı -->
        <div class="result" id="result"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
